name: "Beta Build"

on:
  workflow_dispatch:

  push:
    paths:
      - 'src-tauri/tauri.conf.json'
    branches:
      - feature/beta

permissions:
  contents: write

# Release pipeline: dev → beta → stable
# Beta compares version with dev tag:
# - If same version: reuse dev artifacts (copy-from-dev job)
# - If different version: rebuild from source (build-tauri job)

jobs:
  check-version:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
      current_version: ${{ steps.check.outputs.current_version }}
      dev_version: ${{ steps.check.outputs.dev_version }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version is same as dev build
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Check if dev release exists
          if ! gh release view dev >/dev/null 2>&1; then
            echo "⚠️  Dev release not found, will build normally"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "dev_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fetch dev tag and extract version
          git fetch origin "refs/tags/dev:refs/tags/dev" 2>/dev/null || true

          if ! git rev-parse refs/tags/dev >/dev/null 2>&1; then
            echo "⚠️  Dev tag not found, will build normally"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "dev_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          if ! git cat-file -e refs/tags/dev:src-tauri/tauri.conf.json 2>/dev/null; then
            echo "⚠️  tauri.conf.json not found in dev tag, will build normally"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "dev_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          DEV_VERSION=$(git show "refs/tags/dev:src-tauri/tauri.conf.json" 2>/dev/null | jq -r '.version' 2>&1)
          if [ -z "$DEV_VERSION" ] || [ "$DEV_VERSION" = "null" ]; then
            DEV_VERSION=$(git show "refs/tags/dev:src-tauri/tauri.conf.json" | grep -oP '"version":\s*"\K[^"]+' || echo "")
          fi

          if [ -z "$DEV_VERSION" ]; then
            echo "⚠️  Failed to extract version from dev tag, will build normally"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "dev_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "dev_version=$DEV_VERSION" >> $GITHUB_OUTPUT

          echo "Version check: current=$CURRENT_VERSION, dev=$DEV_VERSION"
          if [ "$CURRENT_VERSION" = "$DEV_VERSION" ]; then
            echo "✅ Same version, reusing dev artifacts"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Version mismatch, building normally"
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

  delete-old-beta:
    needs: check-version
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Delete Old Beta Release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: beta
          delete_release: true
          repo: ${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  copy-from-dev:
    needs: [check-version, delete-old-beta]
    if: needs.check-version.outputs.skip_build == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Create Beta Release and Copy Dev Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")

          # Get dev release info
          DEV_RELEASE=$(gh release view dev --json body,assets)
          CHANGELOG=$(echo "$DEV_RELEASE" | jq -r '.body')

          # Create beta release
          gh release create beta \
            --title "Beta" \
            --notes "$CHANGELOG" \
            --target "$GITHUB_SHA" \
            --prerelease

          # Download and re-upload assets
          TEMP_DIR=$(mktemp -d)

          gh release download dev --dir "$TEMP_DIR" --pattern '*' 2>/dev/null || true

          FILE_COUNT=$(ls -1 "$TEMP_DIR" 2>/dev/null | wc -l)
          if [ "$FILE_COUNT" -gt 0 ]; then
            # Update latest.json URLs from dev to beta
            if [ -f "$TEMP_DIR/latest.json" ]; then
              sed -i "s|/releases/download/dev/|/releases/download/beta/|g" "$TEMP_DIR/latest.json"
              echo "✅ Updated latest.json URLs to point to beta"
            fi

            gh release upload beta "$TEMP_DIR"/* --clobber
            echo "✅ Copied $FILE_COUNT assets from dev to beta"
          else
            echo "⚠️  No assets found in dev release"
          fi

          rm -rf "$TEMP_DIR"

  build-tauri:
    needs: [check-version, delete-old-beta]
    if: needs.check-version.outputs.skip_build == 'false'
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-24.04"
            args: ""
          - platform: "windows-latest"
            args: ""


    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Tauri Version
        id: tauri_version
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Set Up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
            sudo apt update
            sudo apt install libwebkit2gtk-4.1-dev \
              build-essential \
              curl \
              wget \
              file \
              libxdo-dev \
              libssl-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev

      - name: Set Up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
 
      - name: Install Frontend Dependencies
        run: bun install

      - name: Process CHANGELOG
        run: bun run scripts/process-changelog.ts

      - name: Read CHANGELOG
        id: decode
        run: |
          content=$(cat CHANGELOG.MD)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download Binaries
        run: bun run scripts/download-binaries.ts

      - name: Sync config templates from conf-template
        env:
          CONF_TEMPLATE_BRANCH: beta
        shell: bash
        run: |
          set -euo pipefail
          rm -f src/config/templates/generated.ts
          bun run sync-templates
          test -f src/config/templates/generated.ts \
            || { echo "::error::sync-templates did not write generated.ts"; exit 1; }
          grep -q "BUILT_IN_TEMPLATE_OBJECTS" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILT_IN_TEMPLATE_OBJECTS export"; exit 1; }
          grep -q "BUILD_TIME_TEMPLATE_SOURCE" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILD_TIME_TEMPLATE_SOURCE metadata"; exit 1; }
          grep -q "singBoxVersion: 'v" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing singBoxVersion"; exit 1; }
          echo "✓ template snapshot synced and valid"

      - name: Build tun-service (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          bun run build:tun-service --release
          test -f src-tauri/binaries/tun-service-x86_64-pc-windows-msvc.exe \
            || { echo "::error::tun-service binary was not staged for Tauri externalBin"; exit 1; }
          echo "✓ tun-service staged for Tauri externalBin"

      - name: Initialize Apple Signing Key
        if: matrix.platform == 'macos-latest'
        run: |
          echo "${{ secrets.APPLE_AUTH_KEY }}" > $GITHUB_WORKSPACE/temp_auth_key.p8
        shell: bash

      - name: Import signing certificate for helper prebuild
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/helper-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 12)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH"             -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:             -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"             $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Helper signing certificate imported into $KEYCHAIN_PATH"


      - name: Build and Release with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # 加速地址（机密，编译时注入，不会出现在日志中）
          ACCELERATE_URL: ${{ secrets.ACCELERATE_URL }}
          # 作者签名
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # 苹果签名
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # 苹果公证
          APPLE_API_KEY_PATH: ${{ github.workspace }}/temp_auth_key.p8
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          tagName: "beta"
          releaseName: "Beta"
          releaseBody: |
            ${{ steps.decode.outputs.content }}
          args: ${{ matrix.args }}
          prerelease: true

      - name: Clean Up Apple Signing Key
        if: matrix.platform == 'macos-latest'
        run: rm -f temp_auth_key.p8
        shell: bash