name: "Stable Build"

on:
  workflow_dispatch:
  push:
    paths:
      - 'src-tauri/tauri.conf.json'
    branches:
      - main

  workflow_run:
    workflows: ["Beta Build"]
    types: [completed]

jobs:
  check-commit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
      beta_commit: ${{ steps.check.outputs.beta_commit }}
      current_commit: ${{ steps.check.outputs.current_commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if commit is same as beta build
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_COMMIT=$(git rev-parse HEAD)
          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT

          # Check if beta release exists
          if ! gh release view beta >/dev/null 2>&1; then
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "beta_commit=" >> $GITHUB_OUTPUT
            echo "Beta release not found, will build normally"
            exit 0
          fi

          # Get tag that the beta release points to, then get its commit
          BETA_TAG=$(gh release view beta --json tagName -q 2>/dev/null || echo "")

          if [ -z "$BETA_TAG" ]; then
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "beta_commit=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get the commit hash that the beta tag points to
          BETA_COMMIT=$(git rev-list -n 1 "refs/tags/$BETA_TAG" 2>/dev/null || echo "")

          if [ -z "$BETA_COMMIT" ]; then
            # Try fetching the tag
            git fetch origin "refs/tags/$BETA_TAG:refs/tags/$BETA_TAG" 2>/dev/null || true
            BETA_COMMIT=$(git rev-list -n 1 "refs/tags/$BETA_TAG" 2>/dev/null || echo "")
          fi

          echo "beta_commit=$BETA_COMMIT" >> $GITHUB_OUTPUT

          if [ -n "$BETA_COMMIT" ] && [ "$CURRENT_COMMIT" = "$BETA_COMMIT" ]; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
            echo "Same commit as beta build ($CURRENT_COMMIT), will reuse artifacts"
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "Different commit (current: $CURRENT_COMMIT, beta: $BETA_COMMIT), will build normally"
          fi

  delete-old-stable:
    needs: check-commit
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version and delete old stable release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG_NAME="v$VERSION"

          # Try to delete old release with same version
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release delete "$TAG_NAME" --yes --cleanup-tag
          fi

  copy-from-beta:
    needs: [check-commit, delete-old-stable]
    if: needs.check-commit.outputs.skip_build == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Stable Release and Copy Beta Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get current version
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")

          # Get beta release info
          BETA_RELEASE=$(gh release view beta --json body,assets)
          CHANGELOG=$(echo "$BETA_RELEASE" | jq -r '.body')

          # Create stable release
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "$CHANGELOG"

          # Download and re-upload assets
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"

          gh release download beta --pattern '*' || true

          if [ "$(ls -1 | wc -l)" -gt 0 ]; then
            cd -
            gh release upload "v$VERSION" $TEMP_DIR/* --clobber
          fi

          rm -rf "$TEMP_DIR"

  build-tauri:
    needs: [check-commit, delete-old-stable]
    if: needs.check-commit.outputs.skip_build == 'false'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-24.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Tauri Version
        id: tauri_version
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Set Up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
            sudo apt update
            sudo apt install libwebkit2gtk-4.1-dev \
              build-essential \
              curl \
              wget \
              file \
              libxdo-dev \
              libssl-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev

      - name: Set Up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Frontend Dependencies
        run: bun install

      - name: Process CHANGELOG
        run: bun run scripts/process-changelog.ts

      - name: Read CHANGELOG
        id: decode
        run: |
          content=$(cat CHANGELOG.MD)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download Binaries
        run: bun run scripts/download-binaries.ts

      - name: Initialize Apple Signing Key
        if: matrix.platform == 'macos-latest'
        run: |
          echo "${{ secrets.APPLE_AUTH_KEY }}" > $GITHUB_WORKSPACE/temp_auth_key.p8
        shell: bash

      - name: Build and Release with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # 加速地址（机密，编译时注入，不会出现在日志中）
          ACCELERATE_URL: ${{ secrets.ACCELERATE_URL }}
          # 作者签名
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # 苹果签名
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # 苹果公证
          APPLE_API_KEY_PATH: ${{ github.workspace }}/temp_auth_key.p8
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          tagName: "v${{ steps.tauri_version.outputs.version }}"
          releaseName: "v${{ steps.tauri_version.outputs.version }}"
          releaseBody: |
            ${{ steps.decode.outputs.content }}
          args: ${{ matrix.args }}

      - name: Clean Up Apple Signing Key
        if: matrix.platform == 'macos-latest'
        run: rm -f temp_auth_key.p8
        shell: bash