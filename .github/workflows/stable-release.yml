name: "Stable Build"

on:
  workflow_dispatch:
  push:
    paths:
      - 'src-tauri/tauri.conf.json'
    branches:
      - main

  workflow_run:
    workflows: ["Beta Build"]
    types: [completed]

permissions:
  contents: write

# Release pipeline: dev → beta → stable
# Stable compares version with beta tag:
# - If same version: reuse beta artifacts (copy-from-beta job)
# - If different version: rebuild from source (build-tauri job)

jobs:
  check-version:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
      beta_version: ${{ steps.check.outputs.beta_version }}
      current_version: ${{ steps.check.outputs.current_version }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version is same as beta build
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Check if beta release exists
          if ! gh release view beta >/dev/null 2>&1; then
            echo "⚠️  Beta release not found, will build normally"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "beta_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fetch beta tag and extract version
          git fetch origin "refs/tags/beta:refs/tags/beta" 2>/dev/null || true

          if ! git rev-parse refs/tags/beta >/dev/null 2>&1; then
            echo "⚠️  Beta tag not found, will build normally"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "beta_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          if ! git cat-file -e refs/tags/beta:src-tauri/tauri.conf.json 2>/dev/null; then
            echo "⚠️  tauri.conf.json not found in beta tag, will build normally"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "beta_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          BETA_VERSION=$(git show "refs/tags/beta:src-tauri/tauri.conf.json" 2>/dev/null | jq -r '.version' 2>&1)
          if [ -z "$BETA_VERSION" ] || [ "$BETA_VERSION" = "null" ]; then
            BETA_VERSION=$(git show "refs/tags/beta:src-tauri/tauri.conf.json" | grep -oP '"version":\s*"\K[^"]+' || echo "")
          fi

          if [ -z "$BETA_VERSION" ]; then
            echo "⚠️  Failed to extract version from beta tag, will build normally"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "beta_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "beta_version=$BETA_VERSION" >> $GITHUB_OUTPUT

          echo "Version check: current=$CURRENT_VERSION, beta=$BETA_VERSION"
          if [ "$CURRENT_VERSION" = "$BETA_VERSION" ]; then
            echo "✅ Same version, reusing beta artifacts"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Version mismatch, building normally"
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

  copy-from-beta:
    needs: check-version
    if: needs.check-version.outputs.skip_build == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Create Stable Release and Copy Beta Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG_NAME="v$VERSION"

          # Get beta release info
          BETA_RELEASE=$(gh release view beta --json body,assets)
          CHANGELOG=$(echo "$BETA_RELEASE" | jq -r '.body')

          # Create stable release
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$CHANGELOG" \
            --target "$GITHUB_SHA"

          # Download and re-upload assets
          TEMP_DIR=$(mktemp -d)

          gh release download beta --dir "$TEMP_DIR" --pattern '*' 2>/dev/null || true

          FILE_COUNT=$(ls -1 "$TEMP_DIR" 2>/dev/null | wc -l)
          if [ "$FILE_COUNT" -gt 0 ]; then
            # Update latest.json URLs from beta to v{version}
            if [ -f "$TEMP_DIR/latest.json" ]; then
              sed -i "s|/releases/download/beta/|/releases/download/$TAG_NAME/|g" "$TEMP_DIR/latest.json"
              echo "✅ Updated latest.json URLs to point to $TAG_NAME"
            fi

            gh release upload "$TAG_NAME" "$TEMP_DIR"/* --clobber
            echo "✅ Copied $FILE_COUNT assets from beta to $TAG_NAME"
          else
            echo "⚠️  No assets found in beta release"
          fi

          rm -rf "$TEMP_DIR"

  build-tauri:
    needs: check-version
    if: needs.check-version.outputs.skip_build == 'false'
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-24.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Tauri Version
        id: tauri_version
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Set Up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
            sudo apt update
            sudo apt install libwebkit2gtk-4.1-dev \
              build-essential \
              curl \
              wget \
              file \
              libxdo-dev \
              libssl-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev

      - name: Set Up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Frontend Dependencies
        run: bun install

      - name: Process CHANGELOG
        run: bun run scripts/process-changelog.ts

      - name: Read CHANGELOG
        id: decode
        run: |
          content=$(cat CHANGELOG.MD)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download Binaries
        run: bun run scripts/download-binaries.ts

      - name: Sync config templates from conf-template
        env:
          CONF_TEMPLATE_BRANCH: stable
        shell: bash
        run: |
          set -euo pipefail
          rm -f src/config/templates/generated.ts
          bun run sync-templates
          # Smoke-test the output so a silent corruption in scripts/sync-templates.ts
          # or a network 404 fails fast here instead of mid-tauri-build 10 minutes later.
          test -f src/config/templates/generated.ts \
            || { echo "::error::sync-templates did not write generated.ts"; exit 1; }
          grep -q "BUILT_IN_TEMPLATE_OBJECTS" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILT_IN_TEMPLATE_OBJECTS export"; exit 1; }
          grep -q "BUILD_TIME_TEMPLATE_SOURCE" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILD_TIME_TEMPLATE_SOURCE metadata"; exit 1; }
          grep -q "singBoxVersion: 'v" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing singBoxVersion"; exit 1; }
          echo "✓ template snapshot synced and valid"

      - name: Build tun-service (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          bun run build:tun-service --release
          # Smoke-test: the staged binary must exist at the path Tauri
          # externalBin expects before tauri-action invokes `tauri build`.
          test -f src-tauri/binaries/tun-service-x86_64-pc-windows-msvc.exe \
            || { echo "::error::tun-service binary was not staged for Tauri externalBin"; exit 1; }
          echo "✓ tun-service staged for Tauri externalBin"

      - name: Initialize Apple Signing Key
        if: matrix.platform == 'macos-latest'
        run: |
          echo "${{ secrets.APPLE_AUTH_KEY }}" > $GITHUB_WORKSPACE/temp_auth_key.p8
        shell: bash

      - name: Build and Release with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # 加速地址（机密，编译时注入，不会出现在日志中）
          ACCELERATE_URL: ${{ secrets.ACCELERATE_URL }}
          # 作者签名
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # 苹果签名
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # 苹果公证
          APPLE_API_KEY_PATH: ${{ github.workspace }}/temp_auth_key.p8
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          tagName: "v${{ steps.tauri_version.outputs.version }}"
          releaseName: "v${{ steps.tauri_version.outputs.version }}"
          releaseBody: |
            ${{ steps.decode.outputs.content }}
          args: ${{ matrix.args }}

      - name: Clean Up Apple Signing Key
        if: matrix.platform == 'macos-latest'
        run: rm -f temp_auth_key.p8
        shell: bash