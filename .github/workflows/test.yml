name: "Test"

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Frontend unit tests (vitest). Lightweight — no Rust toolchain, no
  # Linux system deps. Runs in parallel with the cargo job below.
  frontend:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set Up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install

      - name: Run Frontend Tests
        run: bun run test

  # Rust unit tests (cargo test) — compiles the tauri lib crate, so the
  # same apt prereqs as a Linux release build are required to satisfy
  # webkit2gtk / appindicator dependencies at link time. The tauri build
  # script also validates every `externalBin` in tauri.conf.json exists
  # on disk, so we pre-stage the sing-box sidecar via the same script
  # release.yml uses — otherwise `cargo test` fails at build-script time
  # with "resource path binaries/sing-box-... doesn't exist".
  rust:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt update
          sudo apt install libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set Up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Frontend Dependencies
        run: bun install

      - name: Download Sidecar Binaries
        run: bun run scripts/download-binaries.ts

      - name: Set Up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Run Rust Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib
